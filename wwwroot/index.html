<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Buzzer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:Segoe UI;
color:white;
min-height:100vh;
overflow-y:auto;
transition:.4s;
}
body.blue{background:radial-gradient(circle,#002255,#000814);}
body.green{background:radial-gradient(circle,#003d1f,#000814);}
body.red{background:radial-gradient(circle,#4d0000,#000814);}
body.gold{background:radial-gradient(circle,#5c4200,#000814);}

#themeSelect{
position:fixed;
top:14px;
left:14px;
z-index:999;
padding:8px;
border-radius:10px;
border:none;
}

#backBtn{
position:fixed;
top:14px;
right:14px;
width:42px;
height:42px;
border-radius:12px;
background:rgba(255,255,255,.08);
color:#00e5ff;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
z-index:999;
}

.container{
display:flex;
flex-direction:column;
min-height:100vh;
padding:10px;
padding-bottom:140px;
}

.players{
background:rgba(255,255,255,.08);
border-radius:12px;
padding:8px;
font-size:14px;
text-align:center;
}

.left{text-align:center;margin-top:10px;}

input{
width:48%;
padding:12px;
margin:4px;
border:none;
border-radius:10px;
font-size:16px;
}

.buzzer{
width:240px;
height:240px;
border-radius:50%;
margin:15px auto;
background:radial-gradient(circle,#ff4d4d,#990000);
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
font-weight:bold;
box-shadow:0 0 30px red,0 0 80px red;
animation:pulse 1.5s infinite;
user-select:none;
-webkit-user-select:none;
-webkit-touch-callout:none;
touch-action:manipulation;
}

.buzzer:active{transform:scale(.93);}

@keyframes pulse{
0%{box-shadow:0 0 20px red;}
50%{box-shadow:0 0 70px red;}
100%{box-shadow:0 0 20px red;}
}

li{
list-style:none;
padding:14px;
margin:6px 0;
border-radius:12px;
background:rgba(255,255,255,.08);
font-size:18px;
}

.gold{background:linear-gradient(90deg,#ffd700,#b8860b);color:black;}
.silver{background:linear-gradient(90deg,#ddd,#888);color:black;}
.bronze{background:linear-gradient(90deg,#cd7f32,#8b4513);}

.pointBtn{
padding:6px 10px;
margin-left:5px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.plus{background:#00c853;color:white;}
.minus{background:#d50000;color:white;}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
}

.bottom button{
flex:1;
border:none;
padding:18px;
font-size:22px;
color:white;
}

.join{background:#00c853;}
.reset{background:#d50000;}
</style>
</head>

<body class="blue">

<select id="themeSelect" onchange="changeTheme()">
<option value="blue">🔵 Neon</option>
<option value="green">🟢 Matrix</option>
<option value="red">🔴 Arcade</option>
<option value="gold">🟡 Gold</option>
</select>

<div id="backBtn" onclick="goBack()" style="display:none;">←</div>

<div class="players">
<h4>👥 Giocatori</h4>
<div id="players"></div>
</div>

<div class="container">

<div class="left">

<h1>BUZZER</h1>

<div id="joinPanel">
<input id="room" placeholder="Codice stanza">
<input id="name" placeholder="Nome">
</div>

<br>

<div class="buzzer" onclick="prenota()" ontouchstart="prenota()">
PRENOTA
</div>

</div>

<div class="right">
<h2>🏆 Prenotati</h2>
<ul id="lista"></ul>

<h2>⭐ Punti</h2>
<ul id="pointsList"></ul>
</div>

</div>

<div class="bottom">
<button id="joinBtn" class="join" onclick="join()">ENTRA</button>
<button id="resetBtn" class="reset" onclick="reset()" style="display:none;">RESET</button>
</div>

<script>
const connection=new signalR.HubConnectionBuilder().withUrl("/buzzerHub").build();

let room="";
let name="";
let joined=false;
let isAdmin=false;

const params=new URLSearchParams(window.location.search);
const roomFromUrl=params.get("room");
if(roomFromUrl) document.getElementById("room").value=roomFromUrl;

window.addEventListener("beforeunload",()=>{
if(joined) connection.invoke("LeaveRoom",room,name);
});

connection.on("JoinError",msg=>alert(msg));

connection.on("UpdatePlayers",(players,admin)=>{
document.getElementById("players").innerHTML=
players.map(x=>`<div>${x} ${x===admin?'👑':''}</div>`).join("");

isAdmin=(admin===name);
document.getElementById("resetBtn").style.display=isAdmin?"block":"none";
});

connection.on("UpdateList",list=>{

let first=list.length?list[0].time:0;

document.getElementById("lista").innerHTML=
list.map((x,i)=>{

let diff=x.time-first;

let cls="";
if(i===0) cls="gold";
if(i===1) cls="silver";
if(i===2) cls="bronze";

if(i===0 && list.length>1 && (list[1].time-first)<100)
setTimeout(()=>alert("🔥 FOTO FINISH"),50);

return `
<li class="${cls}">
${i+1}. ${x.name}
<span style="float:right;">${diff} ms</span>
</li>`;
}).join("");
});

connection.on("UpdatePoints",points=>{

let sorted=Object.entries(points).sort((a,b)=>b[1]-a[1]);

document.getElementById("pointsList").innerHTML=
sorted.map((x,i)=>{

let controls="";

if(isAdmin){
controls=`
<button class="pointBtn plus" onclick="addPoint('${x[0]}')">+</button>
<button class="pointBtn minus" onclick="removePoint('${x[0]}')">-</button>`;
}

return `
<li>
${i+1}. ${x[0]}
<span style="float:right;">
${x[1]} pt
${controls}
</span>
</li>`;
}).join("");
});

connection.start();

function join(){

if(joined) return;

room=document.getElementById("room").value.trim();
name=document.getElementById("name").value.trim();

if(!room||!name){
alert("Inserisci stanza e nome");
return;
}

connection.invoke("JoinRoom",room,name).then(success=>{

if(!success) return;

joined=true;

document.getElementById("joinBtn").style.display="none";
document.getElementById("joinPanel").style.display="none";
document.getElementById("backBtn").style.display="flex";

history.replaceState(null,"","?room="+encodeURIComponent(room));
});
}

function goBack(){

connection.invoke("LeaveRoom",room,name);

joined=false;
isAdmin=false;

room="";
name="";

document.getElementById("joinPanel").style.display="block";
document.getElementById("joinBtn").style.display="block";
document.getElementById("backBtn").style.display="none";
document.getElementById("resetBtn").style.display="none";

document.getElementById("players").innerHTML="";
document.getElementById("lista").innerHTML="";
document.getElementById("pointsList").innerHTML="";
}

function prenota(){

if(!joined) return;

let pos=document.querySelectorAll("#lista li").length+1;

if(navigator.vibrate){
if(pos===1) navigator.vibrate(250);
else if(pos===2) navigator.vibrate([120,60,120]);
else navigator.vibrate(80);
}

playBuzz(pos);

connection.invoke("Prenota",room,name);
}

function reset(){
if(joined) connection.invoke("Reset",room,name);
}

function addPoint(target){
connection.invoke("AddPoint",room,name,target);
}

function removePoint(target){
connection.invoke("RemovePoint",room,name,target);
}

function playBuzz(pos){

const ctx=new(window.AudioContext||window.webkitAudioContext)();
const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.type="square";

if(pos===1) osc.frequency.value=400;
else if(pos===2) osc.frequency.value=250;
else osc.frequency.value=180;

gain.gain.value=.2;

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();

setTimeout(()=>osc.stop(),180);
}

function changeTheme(){
document.body.className=document.getElementById("themeSelect").value;
}
</script>

</body>
</html>
