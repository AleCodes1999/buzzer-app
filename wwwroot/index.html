<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Buzzer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Segoe UI;
    background:radial-gradient(circle,#002255,#000814);
    color:white;
    min-height:100vh;
    overflow-y:auto;
}

   #backBtn{
    position:fixed;
    top:14px;
    right:14px;
    width:42px;
    height:42px;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    color:#00e5ff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
    z-index:999;
    backdrop-filter: blur(6px);
    box-shadow:0 0 12px rgba(0,229,255,.4);
}
    
.container{
    display:flex;
    flex-direction:column;
    min-height:100vh;
    padding:10px;
}

.players{
    background:rgba(255,255,255,0.08);
    border-radius:12px;
    padding:8px;
    font-size:14px;
    text-align:center;
}

.players h4{
    margin:0 0 5px 0;
    color:#00e5ff;
}

.left{
    text-align:center;
    margin-top:10px;
}

input{
    width:48%;
    padding:12px;
    margin:4px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.buzzer{
    width:240px;
    height:240px;
    border-radius:50%;
    margin:15px auto;
    background:radial-gradient(circle,#ff4d4d,#990000);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:34px;
    font-weight:bold;
    box-shadow:0 0 30px red,0 0 80px red;
    animation:pulse 1.5s infinite;

    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
    touch-action:manipulation;
}

.buzzer:active{
    transform:scale(.93);
}

@keyframes pulse{
    0%{box-shadow:0 0 20px red;}
    50%{box-shadow:0 0 70px red;}
    100%{box-shadow:0 0 20px red;}
}

.right{
    padding-bottom:100px;
}

.right h2{
    text-align:center;
    color:#00e5ff;
    margin:5px 0;
}

ul{
    padding:0;
    margin:0;
}

li{
    list-style:none;
    padding:14px;
    margin:6px 0;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    font-size:18px;
}

.gold{background:linear-gradient(90deg,#ffd700,#b8860b);color:black;}
.silver{background:linear-gradient(90deg,#ddd,#888);color:black;}
.bronze{background:linear-gradient(90deg,#cd7f32,#8b4513);}

.bottom{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    display:flex;
}

.bottom button{
    flex:1;
    border:none;
    padding:18px;
    font-size:22px;
    color:white;
}

.join{
    background:#00c853;
}

.reset{
    background:#d50000;
}
</style>
</head>

<body>
    <div id="backBtn" onclick="goBack()" style="display:none;">
    ←
</div>

<!-- PARTECIPANTI -->
<div class="players">
    <h4>👥 Giocatori</h4>
    <div id="players"></div>
</div>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h1 style="color:#00e5ff;">BUZZER</h1>

        <div id="joinPanel">
    <input id="room" placeholder="Codice stanza">
    <input id="name" placeholder="Nome">
</div>

        <br>

        <div class="buzzer" onclick="prenota()" ontouchstart="prenota()">
            PRENOTA
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h2>🏆 Prenotati</h2>
        <ul id="lista"></ul>
    </div>

</div>

<!-- BOTTOM -->
<div class="bottom">
    <button id="joinBtn" class="join" onclick="join()">ENTRA</button>
    <button id="resetBtn" class="reset" onclick="reset()" style="display:none;">RESET</button>
</div>

<script>
const connection = new signalR.HubConnectionBuilder()
    .withUrl("/buzzerHub")
    .build();

let room = "";
let name = "";
let joined = false;
let isAdmin = false;

connection.on("UpdatePlayers", (players, admin) => {

    document.getElementById("players").innerHTML =
        players.map(x =>
            `<div>${x} ${x === admin ? '👑' : ''}</div>`
        ).join("");

    isAdmin = admin === name;

    document.getElementById("resetBtn").style.display =
        isAdmin ? "block" : "none";
});

    connection.on("JoinError", msg => {
    alert(msg);
});

connection.on("UpdateList", list => {

    let first = list.length > 0 ? list[0].time : 0;

    document.getElementById("lista").innerHTML =
        list.map((x, i) => {

            let diff = x.time - first;

            let cls = "";
            if(i === 0) cls = "gold";
            if(i === 1) cls = "silver";
            if(i === 2) cls = "bronze";

            return `
            <li class="${cls}">
                ${i+1}. ${x.name}
                <span style="float:right;">
                    ${diff} ms
                </span>
            </li>`;
        }).join("");
});

    const params = new URLSearchParams(window.location.search);
const roomFromUrl = params.get("room");

if (roomFromUrl) {
    document.getElementById("room").value = roomFromUrl;
}
    
connection.start()
    .then(() => console.log("Connesso"))
    .catch(err => console.error(err));

function join() {

    if (joined) return;

    room = document.getElementById("room").value.trim();
    name = document.getElementById("name").value.trim();

    if (!room || !name) {
        alert("Inserisci stanza e nome");
        return;
    }

    connection.invoke("JoinRoom", room, name)
        .then(() => {

            joined = true;

            document.getElementById("joinBtn").style.display = "none";
            document.getElementById("joinPanel").style.display = "none";
            document.getElementById("backBtn").style.display = "flex";

            // link automatico
            history.replaceState(null, "", "?room=" + encodeURIComponent(room));
        })
        .catch(err => console.error(err));
}
   function goBack(){

    connection.invoke("LeaveRoom", room, name);

    joined = false;
    isAdmin = false;

    room = "";
    name = "";

    document.getElementById("joinPanel").style.display = "block";
    document.getElementById("joinBtn").style.display = "block";
    document.getElementById("resetBtn").style.display = "none";
    document.getElementById("backBtn").style.display = "none";

    document.getElementById("lista").innerHTML = "";
    document.getElementById("players").innerHTML = "";
}
    
function prenota() {

    if (!joined) return;

    if (navigator.vibrate) {
        navigator.vibrate(120);
    }

    playBuzz();

    connection.invoke("Prenota", room, name)
        .catch(err => console.error(err));
}

function prenota() {

    if (!joined) return;

    if (navigator.vibrate) {
        navigator.vibrate(120);
    }

    playBuzz();

    connection.invoke("Prenota", room, name)
        .catch(err => console.error(err));
}

  function reset() {

    if (!joined) return;

    connection.invoke("Reset", room, name)
        .catch(err => console.error(err));
}
function playBuzz() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = 180;

    gain.gain.value = 0.2;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();

    setTimeout(() => {
        osc.stop();
    }, 180);
}
</script>

</body>
</html>
