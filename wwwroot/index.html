<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Buzzer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>

<style>
<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Segoe UI;
    background:radial-gradient(circle,#002255,#000814);
    color:white;
    overflow:hidden;
}

.container{
    display:flex;
    flex-direction:column;
    height:100vh;
    padding:10px;
}

.players{
    background:rgba(255,255,255,0.08);
    border-radius:12px;
    padding:8px;
    font-size:14px;
    text-align:center;
}

.players h4{
    margin:0 0 5px 0;
    color:#00e5ff;
}

.left{
    text-align:center;
    margin-top:10px;
}

input{
    width:48%;
    padding:12px;
    margin:4px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.buzzer{
    width:240px;
    height:240px;
    border-radius:50%;
    margin:15px auto;
    background:radial-gradient(circle,#ff4d4d,#990000);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:34px;
    font-weight:bold;
    box-shadow:0 0 30px red,0 0 80px red;
    animation:pulse 1.5s infinite;
}

.buzzer:active{
    transform:scale(.93);
}

@keyframes pulse{
    0%{box-shadow:0 0 20px red;}
    50%{box-shadow:0 0 70px red;}
    100%{box-shadow:0 0 20px red;}
}

.right{
    flex:1;
    overflow-y:auto;
    margin-bottom:80px;
}

.right h2{
    text-align:center;
    color:#00e5ff;
    margin:5px 0;
}

ul{
    padding:0;
    margin:0;
}

li{
    list-style:none;
    padding:14px;
    margin:6px 0;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    font-size:18px;
}

.gold{background:linear-gradient(90deg,#ffd700,#b8860b);color:black;}
.silver{background:linear-gradient(90deg,#ddd,#888);color:black;}
.bronze{background:linear-gradient(90deg,#cd7f32,#8b4513);}

.bottom{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    display:flex;
}

.bottom button{
    flex:1;
    border:none;
    padding:18px;
    font-size:22px;
    color:white;
}

.join{
    background:#00c853;
}

.reset{
    background:#d50000;
}
</style>
</style>
</head>

<body>

<!-- PARTECIPANTI -->
<div class="players">
    <h4>👥 Giocatori</h4>
    <div id="players"></div>
</div>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h1 style="color:#00e5ff;">BUZZER</h1>

        <input id="room" placeholder="Codice stanza">
        <input id="name" placeholder="Nome">

        <br>

        <div class="buzzer" onclick="prenota()">
            PRENOTA
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h2>🏆 Classifica</h2>
        <ul id="lista"></ul>
    </div>

</div>

<!-- BOTTOM -->
<div class="bottom">
    <button class="join" onclick="join()">ENTRA</button>
    <button class="reset" onclick="reset()">RESET</button>
</div>

<script>
const connection = new signalR.HubConnectionBuilder()
    .withUrl("/buzzerHub")
    .build();

let room = "";
let name = "";
connection.on("UpdatePlayers", players => {
    document.getElementById("players").innerHTML =
        players.map(x => `<div>${x}</div>`).join("");
});
connection.on("UpdateList", list => {

    document.getElementById("lista").innerHTML =
        list.map((x, i) => {
            let cls = "";
            if(i === 0) cls = "gold";
            if(i === 1) cls = "silver";
            if(i === 2) cls = "bronze";

            return `<li class="${cls}">
                <span>${i+1}. ${x}</span>
                <span>⚡</span>
            </li>`;
        }).join("");
});

connection.start();

function join() {
    room = document.getElementById("room").value;
    name = document.getElementById("name").value;
    connection.invoke("JoinRoom", room, name);
}

function prenota() {
    playBuzz();
    connection.invoke("Prenota", room, name);
}

function reset() {
    connection.invoke("Reset", room);
}
function playBuzz() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.type = "sawtooth";
    oscillator.frequency.setValueAtTime(180, audioCtx.currentTime);
    oscillator.frequency.exponentialRampToValueAtTime(90, audioCtx.currentTime + 0.35);

    gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.35);
}
</script>

</body>
</html>
