<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Buzzer</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00142e">

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Segoe UI,Arial;
color:white;
min-height:100vh;
overflow-y:auto;
transition:.35s;
}

body.blue{background:radial-gradient(circle,#002255,#000814);}
body.green{background:radial-gradient(circle,#003d1f,#000814);}
body.red{background:radial-gradient(circle,#4d0000,#000814);}
body.gold{background:radial-gradient(circle,#5c4200,#000814);}

#themeSelect{
position:fixed;
top:14px;
left:14px;
z-index:999;
padding:10px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.12);
color:white;
backdrop-filter:blur(8px);
}

#backBtn{
position:fixed;
top:14px;
right:14px;
width:46px;
height:46px;
border-radius:14px;
background:rgba(255,255,255,.12);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
z-index:999;
backdrop-filter:blur(8px);
box-shadow:0 0 15px rgba(0,255,255,.3);
}

.container{
display:flex;
flex-direction:column;
padding:10px;
padding-bottom:160px;
}

.card{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:12px;
margin-bottom:12px;
backdrop-filter:blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,.18);
}

.players{text-align:center;font-size:14px;}
.left{text-align:center;}

h1{
margin:8px 0 12px;
font-size:34px;
letter-spacing:1px;
text-shadow:0 0 18px rgba(0,255,255,.35);
}

h2{
margin:8px 0;
font-size:22px;
}

input{
width:48%;
padding:14px;
margin:4px;
border:none;
border-radius:12px;
font-size:16px;
background:rgba(255,255,255,.12);
color:white;
}

input::placeholder{color:#ddd;}

.buzzer{
width:250px;
height:250px;
border-radius:50%;
margin:16px auto;
background:radial-gradient(circle,#ff5b5b,#b10000);
display:flex;
justify-content:center;
align-items:center;
font-size:36px;
font-weight:bold;
box-shadow:0 0 30px red,0 0 80px rgba(255,0,0,.5);
animation:pulse 1.4s infinite;
user-select:none;
-webkit-user-select:none;
-webkit-touch-callout:none;
touch-action:manipulation;
}

.buzzer:active{transform:scale(.95);}

@keyframes pulse{
0%{box-shadow:0 0 20px red;}
50%{box-shadow:0 0 70px red;}
100%{box-shadow:0 0 20px red;}
}

li{
list-style:none;
padding:14px;
margin:7px 0;
border-radius:14px;
background:rgba(255,255,255,.08);
font-size:18px;
}

.gold{background:linear-gradient(90deg,#ffd700,#b8860b);color:black;}
.silver{background:linear-gradient(90deg,#ddd,#888);color:black;}
.bronze{background:linear-gradient(90deg,#cd7f32,#8b4513);}

.pointBtn{
padding:7px 10px;
margin-left:4px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.plus{background:#00c853;color:white;}
.minus{background:#d50000;color:white;}

.smallBtn{
width:100%;
padding:14px;
margin-top:8px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:bold;
cursor:pointer;
color:white;
}

.share{background:#1565c0;}
.roundOpen{background:#00c853;}
.roundClosed{background:#ef6c00;}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
z-index:999;
}

.bottom button{
flex:1;
border:none;
padding:18px;
font-size:22px;
color:white;
font-weight:bold;
}

.join{background:#00c853;}
.reset{background:#d50000;}
</style>
</head>

<body class="blue">

<select id="themeSelect" onchange="changeTheme()">
<option value="blue">🔵 Neon</option>
<option value="green">🟢 Matrix</option>
<option value="red">🔴 Arcade</option>
<option value="gold">🟡 Gold</option>
</select>

<div id="backBtn" onclick="goBack()" style="display:none;">←</div>

<div class="container">

<div class="card players">
<h4>👥 Giocatori</h4>
<div id="players"></div>
</div>

<div class="card left">

<h1>BUZZER</h1>

<div id="joinPanel">
<input id="room" placeholder="Codice stanza">
<input id="name" placeholder="Nome">
</div>

<div class="buzzer" onclick="prenota()" ontouchstart="prenota()">PRENOTA</div>
<button class="smallBtn share" id="shareBtn" onclick="shareRoom()" style="display:none;">
📤 Condividi stanza
</button>
<button id="roundBtn" class="smallBtn roundOpen" onclick="toggleRound()" style="display:none;">🟢 Round aperto</button>

</div>

<div class="card">
<h2>🏆 Prenotati</h2>
<ul id="lista"></ul>
</div>

<div class="card">
<h2>⭐ Punti</h2>
<ul id="pointsList"></ul>
</div>

</div>

<div class="bottom">
<button id="joinBtn" class="join" onclick="join()">ENTRA</button>
<button id="resetBtn" class="reset" onclick="reset()" style="display:none;">RESET</button>
</div>

<script>
const connection=new signalR.HubConnectionBuilder().withUrl("/buzzerHub").build();

let room="";
let name=localStorage.getItem("buzzer_name") || "";
let joined=false;
let isAdmin=false;
let roundOpen=true;

document.getElementById("name").value=name;

const params=new URLSearchParams(window.location.search);
const roomFromUrl=params.get("room");
if(roomFromUrl) document.getElementById("room").value=roomFromUrl;

window.addEventListener("beforeunload",()=>{
if(joined) connection.invoke("LeaveRoom",room,name);
});

connection.on("JoinError",msg=>alert(msg));

connection.on("UpdatePlayers",(players,admin,open)=>{

roundOpen=open;

document.getElementById("players").innerHTML=
players.map(x=>`<div>${x} ${x===admin?'👑':''}</div>`).join("");

isAdmin=(admin===name);

document.getElementById("resetBtn").style.display=isAdmin?"block":"none";
document.getElementById("roundBtn").style.display=isAdmin?"block":"none";

let btn=document.getElementById("roundBtn");

if(roundOpen){
btn.innerHTML="🟢 Round aperto";
btn.className="smallBtn roundOpen";
}else{
btn.innerHTML="🟠 Round chiuso";
btn.className="smallBtn roundClosed";
}
});

connection.on("UpdateList",list=>{

let first=list.length?list[0].time:0;

document.getElementById("lista").innerHTML=
list.map((x,i)=>{

let diff=x.time-first;

let cls="";
if(i===0) cls="gold";
if(i===1) cls="silver";
if(i===2) cls="bronze";

return `<li class="${cls}">
${i+1}. ${x.name}
<span style="float:right;">${diff} ms</span>
</li>`;
}).join("");

});

connection.on("UpdatePoints",points=>{

let sorted=Object.entries(points).sort((a,b)=>b[1]-a[1]);

document.getElementById("pointsList").innerHTML=
sorted.map((x,i)=>{

let controls="";

if(isAdmin){
controls=`
<button class="pointBtn plus" onclick="addPoint('${x[0]}')">+</button>
<button class="pointBtn minus" onclick="removePoint('${x[0]}')">-</button>`;
}

return `<li>
${i+1}. ${x[0]}
<span style="float:right;">
${x[1]} pt ${controls}
</span>
</li>`;
}).join("");

});

connection.start();

function join(){

if(joined) return;

room=document.getElementById("room").value.trim();
name=document.getElementById("name").value.trim();

if(!room || !name){
alert("Inserisci stanza e nome");
return;
}

localStorage.setItem("buzzer_name",name);

connection.invoke("JoinRoom",room,name).then(success=>{

if(!success) return;

joined=true;

document.getElementById("joinBtn").style.display="none";
document.getElementById("joinPanel").style.display="none";
document.getElementById("backBtn").style.display="flex";
document.getElementById("shareBtn").style.display="block";

history.replaceState(null,"","?room="+encodeURIComponent(room));
});
}

function goBack(){

connection.invoke("LeaveRoom",room,name);

joined=false;
isAdmin=false;

document.getElementById("joinPanel").style.display="block";
document.getElementById("joinBtn").style.display="block";
document.getElementById("backBtn").style.display="none";
document.getElementById("resetBtn").style.display="none";
document.getElementById("roundBtn").style.display="none";
document.getElementById("shareBtn").style.display="none";

document.getElementById("players").innerHTML="";
document.getElementById("lista").innerHTML="";
document.getElementById("pointsList").innerHTML="";
}

function prenota(){

if(!joined || !roundOpen) return;

let pos=document.querySelectorAll("#lista li").length+1;

if(navigator.vibrate){
if(pos===1) navigator.vibrate(250);
else if(pos===2) navigator.vibrate([120,60,120]);
else navigator.vibrate(80);
}

playBuzz(pos);

connection.invoke("Prenota",room,name);
}

function reset(){
connection.invoke("Reset",room,name);
}

function toggleRound(){
connection.invoke("ToggleRound",room,name);
}

function addPoint(target){
connection.invoke("AddPoint",room,name,target);
}

function removePoint(target){
connection.invoke("RemovePoint",room,name,target);
}

function shareRoom(){

let url=location.origin+"?room="+encodeURIComponent(room);

if(navigator.share){
navigator.share({title:"Buzzer",text:"Entra nella stanza "+room,url:url});
}else{
navigator.clipboard.writeText(url);
alert("Link copiato");
}
}

function playBuzz(pos){

const ctx=new(window.AudioContext||window.webkitAudioContext)();
const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.type="square";

if(pos===1) osc.frequency.value=420;
else if(pos===2) osc.frequency.value=280;
else osc.frequency.value=180;

gain.gain.value=.2;

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();
setTimeout(()=>osc.stop(),180);
}

function changeTheme(){
document.body.className=document.getElementById("themeSelect").value;
localStorage.setItem("buzzer_theme",document.body.className);
}

let savedTheme=localStorage.getItem("buzzer_theme");
if(savedTheme){
document.body.className=savedTheme;
document.getElementById("themeSelect").value=savedTheme;
}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
